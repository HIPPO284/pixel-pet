f;color:#4d38bf;font-size:9px;margin-left:4px}.save-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

    .feedback-modal{position:fixed;inset:0;z-index:250;background:#24213ebd;display:grid;place-items:center;padding:18px}.feedback-dialog{width:min(560px,100%);max-height:min(760px,92vh);overflow:auto;background:#fffdf9;border:1px solid var(--line);box-shadow:0 28px 80px #17152666;padding:22px}.feedback-dialog-head{display:flex;justify-content:space-between;gap:14px;align-items:start}.feedback-dialog h2{margin:0;font-size:23px}.feedback-dialog .sub{color:var(--muted);font-size:12px;line-height:1.65;margin:7px 0 18px}.feedback-close{width:34px;height:34px;border:1px solid var(--line);background:white;font-size:20px}.star-rating{display:flex;gap:7px;margin:8px 0 18px;direction:ltr}.star-btn{border:1px solid var(--line);background:#faf8f2;color:#bbb1a0;font-size:31px;line-height:1;width:48px;height:46px}.star-btn.active,.star-btn:hover{color:#e5a321;background:#fff7d6;border-color:#e5c36a}.feedback-dialog textarea{display:block;width:100%;min-height:130px;resize:vertical;padding:10px;border:1px solid var(--line);background:white;margin-top:6px}.feedback-dialog input[type=text]{display:block;width:100%;padding:10px;border:1px solid var(--line);background:white;margin-top:6px}.feedback-consent{display:flex!important;align-items:flex-start;gap:8px;font-weight:500!important;line-height:1.5}.feedback-consent input{margin-top:3px}.feedback-error{min-height:20px;color:var(--red);font-size:11px;margin:8px 0}.feedback-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}.feedback-count{display:block;text-align:right;color:var(--muted);font-size:10px;margin-top:4px}.feedback-honeypot{position:absolute!important;left:-10000px!important;width:1px!important;height:1px!important;overflow:hidden!important}.download-locked{position:relative}.download-locked:after{content:'🔒';margin-left:5px;font-size:11px}.feedback-success{padding:12px;background:#e9f8f1;border-left:3px solid var(--green);font-size:12px;line-height:1.55}

<body>
  <header class="top"><div class="brand">PIXEL<b>PET</b> LAB</div><div class="top-actions"><div class="top-note">本地编辑 · 不上传照片 · 免费使用</div><span class="save-state" id="saveState">尚未开始</span><label class="language-picker"><span>语言</span><select id="languageSelect" aria-label="语言选择"><option value="zh">中文</option><option value="en">English</option><option value="es">Español</option><option value="fr">Français</option><option value="ru">Русский</option><option value="ar">العربية</option></select></label></div></header>
  <section class="hero"><small>CONNECTED PIXEL RIG EDITOR</small><h1>设计你的专属<br><em>桌面 Pixel Pet</em>。</h1><p>只需上传一张宠物图片，圈出主体、定义相连部件、选择内置像素配饰和动作，再导出 .petpack，让它在透明置顶桌面窗口中持续活动。</p></section>
  <nav class="steps" id="steps"></nav>
  <main class="studio">
    <aside class="panel side">
      <div class="title"><span id="stepNo">01</span><div><small>当前步骤</small><h2 id="stepTitle">上传审核</h2></div></div>
      <div id="controls"></div>
      <div class="nav"><button class="btn" id="prev">← 上一步</button><button class="btn dark" id="next">下一步 →</button></div>
    </aside>
    <section class="panel">
      <div class="canvas-head">
        <span><i class="dot"></i><b id="status">等待照片</b></span>
        <div class="canvas-tools"><button class="icon-btn" id="undo" title="撤销 Ctrl/⌘+Z">↶</button><button class="icon-btn" id="redo" title="重做 Ctrl/⌘+Y">↷</button><span style="width:1px;height:24px;background:var(--line)"></span><button class="icon-btn" id="zoomOut" title="缩小">−</button><b id="zoomText">100%</b><button class="icon-btn" id="zoomIn" title="放大">＋</button><button class="seg" id="panToggle">拖动画布</button><button class="icon-btn" id="resetView" title="恢复视图">⌂</button></div>
      </div>
      <div class="stage" id="stage"><div class="board" id="board"><div class="empty" id="empty"><div><i>▦</i><b>你的角色工作台</b><p>上传照片后，从主体轮廓开始。</p></div></div><canvas id="base" width="900" height="600"></canvas><canvas id="overlay" width="900" height="600"></canvas><div id="htmlLayer"></div><div class="mode-badge hidden" id="modeBadge"></div></div></div>
      <div class="canvas-foot"><div class="legend"><span><i style="background:#7658ff"></i>轮廓/旋转中心</span><span><i style="background:#f04466"></i>五官</span><span><i style="background:#f2a93b"></i>部件轮廓</span></div><span>滚轮缩放 · 拖动画布模式可查看细节</span></div>
    </section>
  </main>

  <div class="feedback-modal hidden" id="feedbackModal" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle" data-no-i18n>
    <div class="feedback-dialog">
      <div class="feedback-dialog-head"><div><h2 id="feedbackTitle"></h2><p class="sub" id="feedbackSubtitle"></p></div><button class="feedback-close" id="feedbackClose" type="button" aria-label="Close">×</button></div>
      <div id="feedbackFormArea">
        <label class="field"><span id="ratingLabel"></span><div class="star-rating" id="starRating" role="radiogroup" aria-label="Rating"><button class="star-btn" type="button" data-rating="1" role="radio" aria-checked="false">★</button><button class="star-btn" type="button" data-rating="2" role="radio" aria-checked="false">★</button><button class="star-btn" type="button" data-rating="3" role="radio" aria-checked="false">★</button><button class="star-btn" type="button" data-rating="4" role="radio" aria-checked="false">★</button><button class="star-btn" type="button" data-rating="5" role="radio" aria-checked="false">★</button></div></label>
        <label class="field"><span id="nationalityLabel"></span><input id="feedbackNationality" type="text" maxlength="80" autocomplete="country-name"><small class="mini-note" id="nationalityHint"></small></label>
        <label class="field"><span id="commentLabel"></span><textarea id="feedbackComment" maxlength="2000"></textarea><span class="feedback-count" id="feedbackCount">0 / 2000</span></label>
        <label class="feedback-consent"><input id="feedbackConsent" type="checkbox"><span id="consentLabel"></span></label>
        <label class="feedback-honeypot" aria-hidden="true">Website<input id="feedbackWebsite" type="text" tabindex="-1" autocomplete="off"></label>
        <div class="feedback-error" id="feedbackError" role="alert"></div>
        <div class="feedback-actions"><button class="btn" id="feedbackCancel" type="button"></button><button class="btn dark" id="feedbackSubmit" type="button"></button></div>
      </div>
      <div class="feedback-success hidden" id="feedbackSuccess"></div>
    </div>
  </div>
  <div class="toast hidden" id="toast"></div>
  <script>
    const $ = s => document.querySelector(s);
    const W = 900, H = 600;
    const steps = ['上传审核','主体与边缘','五官与眨眼','部件与父子骨架','像素与配饰','动作与下载'];
    const base = $('#base'), ctx = base.getContext('2d');
    const overlay = $('#overlay'), ox = overlay.getContext('2d');
    const board = $('#board'), html = $('#htmlLayer'), stageEl = $('#stage');
    const work = document.createElement('canvas'), wx = work.getContext('2d'); work.width=W; work.height=H;
    const mask = document.createElement('canvas'), mx = mask.getContext('2d'); mask.width=W; mask.height=H;

    let step=0, img=null, fileMeta=null, audit=null, sourceBlob=null;
    let saveTimer=null, toastTimer=null, lastSavedAt=null, dirty=false, sourceIsFlattened=false;
    let fit={x:0,y:0,w:0,h:0}, view={zoom:1,panX:0,panY:0,panning:false};
    let subject=[], current=[], drawing=false, editMode='lasso', brushOps=[], brushStrokes=[], activeStroke=null, brushSize=26, feather=1, backdrop='checker';
    let headBox={x:.27,y:.07,w:.46,h:.42}, blinkEnabled=true, blinkClosed=false, blinkTimer=null, blinkPreviewRaf=0, blinkAmount=0;
    let faces=[
      {id:'eyeL',type:'eye',name:'左眼',x:.42,y:.27,w:.055,h:.045,visible:true},
      {id:'eyeR',type:'eye',name:'右眼',x:.58,y:.27,w:.055,h:.045,visible:true},
      {id:'nose',type:'nose',name:'鼻子',x:.50,y:.36,w:.035,h:.03,visible:true},
      {id:'mouth',type:'mouth',name:'嘴巴',x:.50,y:.43,w:.09,h:.025,visible:true}
    ];
    let selectedFace='eyeL';
    let parts=[], selectedPart=null, partType='body', selectedSide='none', selectedPosition='none', overlap=14, rigReport=[], showRigLinks=true;
    let pixelSize=48, paletteSize=20, accessories=[], selectedAccessory=null, petName='我的 Pixel Pet';
    let motionPreset='walk';
    let motion={head:true,limbs:true,ears:true,tail:true,blink:true,bounce:true,breathe:true,wave:false,nod:false,spin:false,hop:false,dance:false,mouth:true,sniff:true}, speed=1, amplitude=1, animId=0;
    const FEEDBACK_STORAGE_KEY='pixelpet-feedback-receipt-v1';
    const FEEDBACK_CLIENT_KEY='pixelpet-feedback-client-v1';
    const FEEDBACK_API_BASE=(location.protocol==='file:'?'http://localhost:8787':'')+'/api';
